version: "3.9"

services:

  api:
    build: .

    container_name: cifar10-api

    command: >
      uvicorn src.api:app
      --host 0.0.0.0
      --port 8000

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    build: .

    container_name: cifar10-streamlit

    command: >
      streamlit run src/app.py
      --server.address=0.0.0.0
      --server.port=8501

    ports:
      - "8501:8501"

    depends_on:
      api:
        condition: service_started

    volumes:
      - .:/app

    restart: unless-stopped